name: Build Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build standalone executable
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed --name GamingPenguinsPostingTool --add-data "assets;assets" app.py

      - name: Create release archive
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/GamingPenguinsPostingTool.exe" -DestinationPath "dist/GamingPenguinsPostingTool-windows-x64.zip" -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: GamingPenguinsPostingTool-windows-x64
          path: dist/GamingPenguinsPostingTool-windows-x64.zip

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/GamingPenguinsPostingTool-windows-x64.zip
